# Trackarr — VPN-routed pings via container (example: Gluetun)
#
# Trackarr itself sits on the NORMAL Docker network so it can reach qBittorrent
# and your local LAN directly. Pings are routed through an ephemeral container
# that shares the Gluetun network namespace, so all ping traffic exits through
# the VPN tunnel. This is the correct architecture for this use case.
#
# Set VPN_CONTAINER to the name of your running Gluetun container.
# The Docker socket must be mounted so Trackarr can spawn the ephemeral
# ping container at runtime.
#
# Gluetun's port mapping must include Trackarr's GUI port if Gluetun is in
# the same stack, OR you expose Trackarr's port directly (as done below)
# since Trackarr is on the normal network and doesn't share Gluetun's namespace.

services:
  trackarr:
    image: ghcr.io/o51r15/trackarr:latest
    container_name: trackarr
    restart: unless-stopped
    ports:
      - "7374:7374"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - QBT_URL=http://192.168.1.x:8080
      - QBT_USER=admin
      - QBT_PASS=changeme
      - VPN_CONTAINER=gluetun              # name of your running Gluetun container
      # Optional:
      # - GITHUB_TOKEN=
      # - PUSHOVER_USER=
      # - PUSHOVER_TOKEN=
      # - WEBHOOK_URL=
      # - OLLAMA_URL=http://192.168.1.x:11434
      # - OLLAMA_MODEL=gemma4:latest
