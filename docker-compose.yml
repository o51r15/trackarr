# Trackarr — direct or proxy mode (no VPN container)
#
# No VPN network attached. Trackarr pings in-process directly or via
# SOCKS5/HTTP proxy. Set connection_mode and proxy_url in the GUI Config tab.

services:
  trackarr:
    image: ghcr.io/o51r15/trackarr:latest
    container_name: trackarr
    restart: unless-stopped
    ports:
      - "7374:7374"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - QBT_URL=http://192.168.1.x:8080
      - QBT_USER=admin
      - QBT_PASS=changeme
      # Optional:
      # - GITHUB_TOKEN=
      # - PUSHOVER_USER=
      # - PUSHOVER_TOKEN=
      # - WEBHOOK_URL=
      # - OLLAMA_URL=http://192.168.1.x:11434
      # - OLLAMA_MODEL=gemma4:latest
      # - VPN_CONTAINER=                        # leave empty — no VPN container in this compose
